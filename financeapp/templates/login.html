<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FinanceOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --accent: #00E5A0;
      --accent-dim: rgba(0,229,160,0.12);
      --danger: #FF4D6A;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0D0F14;
      color: #E8EAF0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Animated background orbs */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.12;
      pointer-events: none; z-index: 0;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: #00E5A0; top: -150px; right: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #38BEFF; bottom: -100px; left: -80px; animation-delay: -4s; }
    @keyframes orbFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    .auth-wrap {
      width: 100%; max-width: 420px;
      padding: 0 20px;
      position: relative; z-index: 1;
    }
    .auth-card {
      background: rgba(22, 27, 39, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.4);
    }
    .brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: var(--accent); border-radius: 12px;
      display: grid; place-items: center;
      font-size: 20px; color: #000;
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 800; color: #fff;
    }
    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 26px; font-weight: 800;
      margin-bottom: 6px; color: #fff;
    }
    .sub { font-size: 14px; color: #8B90A6; margin-bottom: 28px; }
    .flash-msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13.5px;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .flash-danger { background: rgba(255,77,106,0.1); border: 1px solid rgba(255,77,106,0.3); color: #f5cedb; }
    .flash-success { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.3); color: #cef5e7; }
    .flash-info    { background: rgba(56,190,255,0.1); border: 1px solid rgba(56,190,255,0.3); color: #cee8f5; }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px; font-weight: 700;
      color: #8B90A6; text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: #565B72; font-size: 16px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 11px;
      padding: 11px 14px 11px 40px;
      color: #E8EAF0;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      background: rgba(0,229,160,0.05);
      box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
    }
    input::placeholder { color: #565B72; }
    .btn-submit {
      width: 100%;
      background: var(--accent); color: #000;
      border: none; border-radius: 11px;
      padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 6px;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover {
      opacity: 0.9; transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,229,160,0.3);
    }
    .switch-link {
      text-align: center; margin-top: 22px;
      font-size: 13.5px; color: #8B90A6;
    }
    .switch-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .switch-link a:hover { text-decoration: underline; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: #565B72; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: rgba(255,255,255,0.07);
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-icon"><i class="bi bi-currency-exchange"></i></div>
        <div class="brand-name">FinanceOS</div>
      </div>
      <h2>Welcome back</h2>
      <p class="sub">Log in to your finance dashboard</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="flash-msg flash-{{ cat }}">
            <i class="bi {% if cat == 'danger' %}bi-x-circle-fill{% elif cat == 'success' %}bi-check-circle-fill{% else %}bi-info-circle-fill{% endif %}"></i>
            {{ msg }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" name="email" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-submit">
          <i class="bi bi-arrow-right-circle-fill"></i> Log In
        </button>
      </form>
      <div class="switch-link">
        Don't have an account? <a href="{{ url_for('signup') }}">Sign up free</a>
      </div>
    </div>
  </div>
</body>
</html>
